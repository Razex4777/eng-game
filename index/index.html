<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>بوابة الطالب الذكي</title>
    
    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-H90E46NFQT"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-H90E46NFQT');
    </script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Nunito', 'sans-serif'],
                        arabic: ['Tajawal', 'sans-serif']
                    },
                    colors: {
                        brand: {
                            light: '#7B7FFF',
                            DEFAULT: '#5B5FED',
                            dark: '#4347C7',
                        }
                    }
                }
            }
        }
    </script>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    
    <!-- Page Styles -->
    <link rel="stylesheet" href="/index/css/index.css">
    
    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/js/supabase-config.js"></script>
</head>
<body class="min-h-screen transition-colors duration-500 level-selector-bg bg-blue-50">

    <!-- Fullscreen Toggle Button -->
    <button onclick="toggleFullScreen()" class="fullscreen-toggle" title="ملائمة الشاشة">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2-2h3"></path>
        </svg>
    </button>

    <!-- Floating Feedback Button -->
    <button onclick="openFeedbackModal()" class="feedback-btn group">
        <span class="text-2xl group-hover:rotate-12 transition-transform">💡</span>
        <span class="text-base">خلي بصمتك</span>
    </button>

    <!-- Feedback Modal -->
    <div id="feedback-modal" class="fixed inset-0 z-[60] modal-overlay hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-[2rem] p-8 w-full max-w-sm shadow-2xl transform transition-all scale-100 relative border-4 border-indigo-100">
            <button type="button" onclick="closeFeedbackModal()" class="absolute top-4 left-4 text-gray-400 hover:text-gray-600 text-xl font-black bg-slate-100 w-8 h-8 rounded-full flex items-center justify-center transition-colors cursor-pointer z-50">✕</button>
            <div class="text-center mb-6">
                <div class="text-5xl mb-4 animate-bounce">🤔</div>
                <h3 class="text-xl font-black text-slate-800 mb-2">اللعبة تكبر بأفكاركم...</h3>
                <p class="text-indigo-500 text-sm font-black">شنو اقتراحك حتى نطوّرها؟</p>
            </div>
            <textarea id="feedback-text" class="w-full h-32 bg-slate-50 border-2 border-slate-200 rounded-2xl p-4 text-right mb-4 focus:border-brand focus:outline-none font-bold text-slate-700 placeholder-slate-400 resize-none transition-all focus:ring-4 focus:ring-indigo-100" placeholder="اكتب اقتراحك هنا..."></textarea>
            <button onclick="submitFeedback()" class="w-full bg-gradient-to-r from-brand to-brand-light text-white font-black py-4 rounded-xl shadow-xl shadow-indigo-200 hover:translate-y-[-2px] hover:shadow-2xl transition-all active:scale-95 text-lg">
                إرسال الاقتراح 🚀
            </button>
        </div>
    </div>

    <!-- Background Container -->
    <div id="bg-container" class="fixed inset-0 bg-gradient-to-br from-blue-100 via-blue-50 to-blue-100 -z-10"></div>
    
    <!-- Top Bar -->
    <div class="fixed top-0 left-0 w-full z-40 p-4 flex justify-between items-start pointer-events-none pl-20">
        <!-- XP Display -->
        <div class="pointer-events-auto bg-gradient-to-r from-amber-500 to-amber-600 text-white px-5 py-2 rounded-2xl flex flex-col items-center shadow-lg border-2 border-white/20 transform hover:scale-105 transition-transform">
            <span class="text-[10px] font-black opacity-90 tracking-widest mb-0.5" style="font-family: 'Nunito', sans-serif;">TOTAL XP</span>
            <div class="flex items-center gap-1">
                <span class="text-xl">✨</span>
                <span id="total-xp-display" class="text-3xl font-black leading-none" style="font-family: 'Nunito', sans-serif;">0</span>
            </div>
        </div>

        <!-- User Info -->
        <div class="pointer-events-auto flex items-start gap-3">
            <button onclick="logout()" class="bg-white/90 px-4 py-3 rounded-xl shadow-lg border-2 border-slate-100 backdrop-blur-sm hover:bg-white transition-all group" title="تسجيل خروج">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="text-slate-700 group-hover:translate-x-1 transition-transform">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                    <polyline points="16 17 21 12 16 7"/>
                    <line x1="21" y1="12" x2="9" y2="12"/>
                </svg>
            </button>
            
            <div id="user-info" class="bg-white/90 px-4 py-2 rounded-xl shadow-lg border-2 border-slate-100 hidden backdrop-blur-sm">
                <div class="flex items-center gap-2 mb-1">
                    <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
                    <span id="user-type-display" class="text-sm font-black text-slate-700 block">ضيف</span>
                </div>
                <span id="user-name" class="hidden"></span>
                <button onclick="logout()" class="text-xs text-red-500 font-bold hover:underline w-full text-left">تسجيل خروج</button>
            </div>
        </div>
    </div>

    <!-- Levels Grid -->
    <div class="w-full max-w-md mx-auto px-4 relative flex flex-col items-center gap-12 pb-32 z-10" style="min-height: 100vh; padding-top: 120px;">
        <div id="level-path" class="absolute top-24 bottom-20 left-1/2 w-4 -translate-x-1/2 rounded-full border-2 shadow-inner bg-white border-slate-300"></div>
        <div id="levels-grid" class="contents"></div>
    </div>

    <!-- Page Scripts (order matters!) -->
    <script src="/index/js/index-config.js"></script>
    <script src="/index/js/index-auth.js"></script>
    <script src="/index/js/index-ui.js"></script>
    <script src="/index/js/index-init.js"></script>
</body>
</html>
